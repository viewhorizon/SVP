name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Run frontend/service tests
        run: npx vitest run src/services/kanbanService.test.ts

      - name: Run backend API tests
        run: |
          npx vitest run backend/tests/api.integration.test.ts
          npx vitest run backend/tests/aiPlanning.integration.test.ts